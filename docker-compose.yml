services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skills_agent
      POSTGRES_USER: skills_agent
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skills_agent -d skills_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      PLATFORM_MODE: api
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy
    command: ["gunicorn", "--config", "deploy/gunicorn.conf.py", "platform_api.app:app"]
    expose: ["8080"]

  dashboard:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      PLATFORM_MODE: dashboard
    command: ["gunicorn", "--config", "deploy/gunicorn-dashboard.conf.py", "app_dash:app.server"]
    expose: ["8050"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [api, dashboard]
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  database_url:
    file: ./secrets/database_url.txt
